<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="simpleGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#667eea" />
      <stop offset="100%" stop-color="#764ba2" />
    </linearGradient>
    <linearGradient id="simpleHeart" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff6b6b" />
      <stop offset="100%" stop-color="#ff8e8e" />
    </linearGradient>
  </defs>

  <!-- 简化版背景 -->
  <circle cx="50" cy="50" r="45" fill="url(#simpleGradient)" />

  <!-- 简化心脏图标 -->
  <path d="M50,35 
           C45,30 35,30 30,35 
           C25,40 25,50 30,55 
           L50,75 
           L70,55 
           C75,50 75,40 70,35 
           C65,30 55,30 50,35 Z" 
        fill="url(#simpleHeart)" />

  <!-- AI元素 -->
  <circle cx="50" cy="50" r="8" fill="white" opacity="0.9" />
  <path d="M45,45 L55,55 M55,45 L45,55" stroke="#667eea" stroke-width="2" />

  <!-- 文字 -->
  <text x="50" y="85" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="white">
    AI健康
  </text>
</svg>